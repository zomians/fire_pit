<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<!--
  template.html — 麻の葉 FIRE PIT 図面シートのコピー元（C1: vanilla JS・依存ゼロ）
  使い方:
    1) このファイルを sheets/a-0N-<役割>.html に複製する
    2) 表題欄(SHEET/TITLE/SCALE) の値を差し替える
    3) <script> 内の draw() で lib/firepit.js の関数を呼び、#figure に SVG を描く
  原則: React/Babel/CDN を使わない。外部依存は Google Fonts のみ（→ ADR-0001）。
-->
<title>麻の葉 FIRE PIT — 図面シート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f5f1e8;
    --grid: rgba(26,26,26,0.06);
    --thin: 0.6px;
    --med: 1px;
    --thick: 1.6px;
    --sans: "Noto Sans JP", system-ui, sans-serif;
    --mono: "IBM Plex Mono", "SF Mono", monospace;
  }
  @page { size: A4 landscape; margin: 6mm; }
  html, body { margin: 0; padding: 0; background: #d8d3c5; font-family: var(--sans); color: var(--ink); }
  .sheet {
    width: 297mm; height: 210mm; box-sizing: border-box;
    margin: 12px auto; background: var(--paper);
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    position: relative; overflow: hidden;
  }
  .sheet svg { display: block; width: 100%; height: 100%; }
  @media print {
    html, body { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .sheet { margin: 0; box-shadow: none; }
  }
</style>
</head>
<body>
<div class="sheet">
  <svg viewBox="0 0 1080 760" xmlns="http://www.w3.org/2000/svg" id="root">
    <defs>
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M20 0 L0 0 0 20" fill="none" stroke="var(--grid)" stroke-width="0.5"/>
      </pattern>
    </defs>

    <!-- 紙地＋極薄方眼 -->
    <rect x="0" y="0" width="1080" height="760" fill="var(--paper)"/>
    <rect x="0" y="0" width="1080" height="760" fill="url(#grid)"/>

    <!-- 図面枠（二重枠） -->
    <rect x="20" y="20" width="1040" height="720" fill="none" stroke="var(--ink)" stroke-width="1.6"/>
    <rect x="28" y="28" width="1024" height="704" fill="none" stroke="var(--ink)" stroke-width="0.6"/>
    <!-- センタリングマーク（四辺中央） -->
    <g stroke="var(--ink)" stroke-width="0.6">
      <line x1="540" y1="20" x2="540" y2="34"/><line x1="540" y1="726" x2="540" y2="740"/>
      <line x1="20" y1="380" x2="34" y2="380"/><line x1="1046" y1="380" x2="1060" y2="380"/>
    </g>

    <!-- 図面本体（lib/firepit.js が描画） -->
    <g id="figure"></g>

    <!-- 表題欄（差し替える） -->
    <g font-family="var(--sans)" fill="var(--ink)">
      <rect x="720" y="660" width="320" height="70" fill="none" stroke="var(--ink)" stroke-width="1"/>
      <line x1="720" y1="682" x2="1040" y2="682" stroke="var(--ink)" stroke-width="0.6"/>
      <line x1="896" y1="682" x2="896" y2="730" stroke="var(--ink)" stroke-width="0.6"/>
      <text x="728" y="675" font-size="10" font-family="var(--mono)">PROJECT</text>
      <text x="1032" y="675" font-size="10" font-family="var(--mono)" text-anchor="end" id="tb-sheet">A-0N</text>
      <text x="728" y="700" font-size="13" font-weight="600">麻の葉 FIRE PIT</text>
      <text x="728" y="717" font-size="11" fill="#444" id="tb-title">図面名 TITLE</text>
      <text x="904" y="700" font-size="10" font-family="var(--mono)">SCALE</text>
      <text x="904" y="716" font-size="12" font-family="var(--mono)" id="tb-scale">1:NN</text>
      <text x="728" y="725" font-size="9" font-family="var(--mono)" fill="#666">単位: mm</text>
    </g>
  </svg>
</div>

<!-- C1: パラメトリック幾何＋作図ユーティリティ（依存ゼロ・classic script） -->
<script src="../lib/firepit.js"></script>
<script>

  }

</script>
</body>
</html>
